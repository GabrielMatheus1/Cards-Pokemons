<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards Pokemons</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/responsive.css">
</head>

<body class="page">
    
    <header>
        <h1 class="cabecalho"></h1>
    </header>

    <main class="personagens-slider">
        <div>
            <img class="imagem selecionada" src="./src/img/fundo001-003.jfif" alt="fundo de floresta para pokemons de planta">
        </div>

        <button class="btn-seta btn-voltar" onclick="backCard()">
            <img src="./src/img/esquerda.png" alt="botão para voltar" class="img-btn">
        </button>

        <ul class="lista-personagens">   
          
            <li class="cartao">
                <div class="cartao_header">
                    <h2 class="cartao_nome"></h2>
                    <span class="cartao_id"></span>
                </div>
                <div class="img_card">
                    <img src="" alt="imagem do Pokémon" class="imagem-personagem">
                    <div class="elementos_pokemon"></div>
                </div>

                
            </li>

        </ul>

        <button class="btn-seta btn-avancar" onclick="nextCard()">
            <img src="./src/img/direita.png" alt="botão para avançar" class="img-btn">
        </button>

    </main>
    <script src="./src/js/interatividade.js"></script>
</body>

</html>
